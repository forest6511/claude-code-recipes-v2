name: severity-gate
on:
  check_run:
    types: [completed]
jobs:
  gate:
    if: github.event.check_run.name == 'Claude Code Review'
    runs-on: ubuntu-latest
    steps:
      - name: Read severity counts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNTS=$(gh api "repos/${{ github.repository }}/check-runs/${{ github.event.check_run.id }}" \
            --jq '.output.text | split("bughunter-severity: ")[1] | split(" -->")[0] | fromjson')
          echo "$COUNTS"
          NORMAL=$(echo "$COUNTS" | jq -r '.normal // 0')
          if [ "$NORMAL" -gt 0 ]; then
            echo "::error::Code Review found $NORMAL Important finding(s)" >&2
            exit 1
          fi
